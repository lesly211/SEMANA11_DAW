{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tienda Virtual{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'catalogo/css/style.css' %}">
</head>
<body>
    <header>
        <nav class="nav-container">
            <a href="{% url 'home' %}" class="logo">DjangoShop</a>
            <div class="nav-links">
                <a href="{% url 'home' %}">Inicio</a>
                <a href="{% url 'catalogo' %}">Catálogo</a>
            </div>
        </nav>
    </header>
    <main>
        {% block content %}
        {% endblock %}
    </main>
    <footer>
        <p>&copy; 2026 DjangoShop. Todos los derechos reservados. Desarrollado con Django 5.1.</p>
    </footer>
</body>
</html>
